name: Deploy Sharda Palace to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build static export
        run: npm run build:static
        env:
          # Set these in GitHub → Repository → Settings → Secrets and variables → Actions
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_HOTEL_PHONE: ${{ vars.NEXT_PUBLIC_HOTEL_PHONE || '7303584266' }}
          NEXT_PUBLIC_HOTEL_WHATSAPP: ${{ vars.NEXT_PUBLIC_HOTEL_WHATSAPP || '917303584266' }}
          NEXT_PUBLIC_HOTEL_EMAIL: ${{ vars.NEXT_PUBLIC_HOTEL_EMAIL || 'info@shardapalace.in' }}
          NEXT_PUBLIC_HOTEL_ADDRESS: ${{ vars.NEXT_PUBLIC_HOTEL_ADDRESS || 'Mathura Road, Vrindavan' }}
          # Leave blank for custom domain, set to /repo-name for github.io/repo-name
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || '' }}
          NEXT_PUBLIC_MODE: static
          SESSION_SECRET: not-used-in-static-build
          SUPABASE_SERVICE_ROLE_KEY: not-used-in-static-build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
