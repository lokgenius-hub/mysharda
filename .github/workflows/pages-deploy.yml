name: Deploy static site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        # Avoid optional native bindings that sometimes fail on CI (see npm/cli#4828)
        env:
          NPM_CONFIG_OPTIONAL: 'false'
        run: |
          # Prefer clean, deterministic install. If `npm ci` fails due to optional native
          # dependency issues, remove lockfile and node_modules and fall back to `npm i`.
          set -e
          npm ci || (rm -rf node_modules package-lock.json && npm i)

      - name: Build (static export)
        env:
          NEXT_PUBLIC_MODE: static
        run: npm run build:web

      - name: Show output dir for debug
        run: ls -la out || true

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
